[tool.black]
line-length = 80
target-version = ["py312"]
extend-exclude = '''
/(
    \.gradle
  | build
  | hf_env
  | mobile/androidApp/build
)/
'''

[tool.ruff]
line-length = 80
target-version = "py312"
extend-exclude = [".gradle", "build", "hf_env", "mobile/androidApp/build"]

[tool.ruff.lint]
extend-select = ["E501", "N", "C90"]

[tool.ruff.lint.mccabe]
max-complexity = 7
