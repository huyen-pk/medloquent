name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-shared:
    name: Build :shared
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            mobile/.gradle-wrapper-dists
          key: ${{ runner.os }}-gradle-${{ hashFiles('build.sh','mobile/gradle/wrapper/gradle-wrapper.properties','mobile/**/*.gradle.kts','mobile/gradle.properties') }}
      - name: Ensure build entrypoints are executable
        run: chmod +x ./build.sh ./mobile/gradlew || true
      - name: Build shared module
        run: bash ./build.sh mobile :shared:assemble --no-daemon --stacktrace
        env:
          CI: true

  build-android:
    name: Build :androidApp (assembleDebug)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Install Android SDK command-line tools
        run: |
          export ANDROID_SDK_ROOT="$RUNNER_TOOL_CACHE/android-sdk"
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd $ANDROID_SDK_ROOT
          curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -o cmdline.zip
          unzip -q cmdline.zip -d cmdline-tools
          mv cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest || true
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-35" "build-tools;35.0.0"
      - name: Accept licenses
        run: |
          export ANDROID_SDK_ROOT="$RUNNER_TOOL_CACHE/android-sdk"
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            mobile/.gradle-wrapper-dists
          key: ${{ runner.os }}-gradle-${{ hashFiles('build.sh','mobile/gradle/wrapper/gradle-wrapper.properties','mobile/**/*.gradle.kts','mobile/gradle.properties') }}
      - name: Ensure build entrypoints are executable
        run: chmod +x ./build.sh ./mobile/gradlew || true
      - name: Build androidApp assembleDebug
        run: |
          export ANDROID_SDK_ROOT="$RUNNER_TOOL_CACHE/android-sdk"
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          bash ./build.sh mobile :androidApp:assembleDebug --no-daemon --stacktrace
        env:
          CI: true
